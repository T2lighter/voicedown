<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceDown - 音频捕获验证</title>
    <style>
      /* 预置暗色主题（与 App.css --bg #1c1c1e 一致），消除启动各阶段背景闪烁 */
      html, body, #root {
        margin: 0;
        height: 100%;
        background: #1c1c1e;
        color: #e1e4e8;
      }

      /* React 加载前的静态占位（纯 HTML/CSS，不依赖 JS）。
         dev 模式下 vite 首次编译 React bundle 需数秒，期间 #root 为空会黑屏无反馈。
         此占位立即渲染；React mount 后 createRoot 清空 #root，占位自动消失。 */
      #app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        font-family: "Segoe UI Variable", "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #app-boot .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid #3a3a3c;
        border-top-color: #bf5af2; /* App.css --purple */
        border-radius: 50%;
        animation: app-boot-spin 0.8s linear infinite;
      }
      #app-boot .title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.2px;
        color: #ffffff;
      }
      #app-boot .hint {
        font-size: 13px;
        color: #98989f; /* App.css --label-secondary */
      }
      @keyframes app-boot-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-boot .spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-boot">
        <div class="spinner"></div>
        <div class="title">VoiceDown</div>
        <div class="hint">加载中…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
